<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>CleanTek Room Booking</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background-color: #f3f2f1; }
        h3 { color: #0078d4; font-size: 16px; border-bottom: 2px solid #0078d4; padding-bottom: 5px; }
        .room { padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #ddd; background: #fff; position: relative; }
        .busy { border-left: 5px solid #d13438; color: #a4262c; }
        .free { border-left: 5px solid #107c10; color: #107c10; cursor: pointer; }
        .free:hover { background: #f0f9f1; }
        #list { margin-top: 15px; }
        #debug { font-size: 10px; color: #888; margin-top: 30px; text-align: center; }
        .loading { text-align: center; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>CleanTek 會議室狀態</h3>
    <div id="list" class="loading">正在確認時間...</div>
    <div id="debug">初始化中...</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzjZ-JU0HeJwbvRurk1WbimU_jXBugi061hcnaP1dmJpgJ0_NldqAUXCXMlirTwHjNG/exec";

        Office.onReady((info) => {
            if (info.host === Office.HostType.Outlook) {
                document.getElementById('debug').innerText = "Outlook 已連線";
                // 進入循環檢查
                setInterval(updateStatus, 4000);
                updateStatus();
            } else {
                document.getElementById('list').innerHTML = "請於 Outlook 會議視窗中開啟";
                document.getElementById('debug').innerText = "外部瀏覽器模式";
            }
        });

        function updateStatus() {
            Office.context.mailbox.item.start.getAsync((s) => {
                Office.context.mailbox.item.end.getAsync((e) => {
                    if (!s.value || !e.value) {
                        document.getElementById('list').innerHTML = "請先設定會議起迄時間";
                        return;
                    }
                    const start = s.value.toISOString();
                    const end = e.value.toISOString();
                    const url = `${GAS_URL}?action=check&start=${start}&end=${end}`;

                    fetch(url)
                        .then(r => r.json())
                        .then(rooms => {
                            const html = rooms.map(r => `
                                <div class="room ${r.is_busy ? 'busy' : 'free'}" onclick="${r.is_busy ? '' : `book('${r.name}')`}">
                                    <strong>${r.name}</strong><br>
                                    <small>${r.is_busy ? '❌ 已被佔用' : '✅ 點擊預約'}</small>
                                </div>
                            `).join('');
                            document.getElementById('list').innerHTML = html;
                        })
                        .catch(() => {
                            document.getElementById('list').innerHTML = "無法讀取資料，請檢查網路。";
                        });
                });
            });
        }

        function book(roomName) {
            if (!confirm("確定要預約 " + roomName + " 嗎？")) return;
            
            Office.context.mailbox.item.start.getAsync(s => {
                Office.context.mailbox.item.end.getAsync(e => {
                    const user = Office.context.mailbox.userProfile.emailAddress;
                    const bookUrl = `${GAS_URL}?action=book&room=${encodeURIComponent(roomName)}&start=${s.value.toISOString()}&end=${e.value.toISOString()}&user=${encodeURIComponent(user)}`;
                    
                    document.getElementById('list').innerHTML = "正在預約中...";
                    
                    fetch(bookUrl).then(() => {
                        alert("預約成功！");
                        Office.context.mailbox.item.location.setAsync(roomName);
                        updateStatus();
                    });
                });
            });
        }
    </script>
</body>
</html>
