<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .room { padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        .busy { background: #ffdee2; color: #a80000; }
        .free { background: #e3fcef; color: #006644; cursor: pointer; }
    </script>
</head>
<body>
    <h3>會議室狀態預覽</h3>
    <div id="list">讀取中...</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzjZ-JU0HeJwbvRurk1WbimU_jXBugi061hcnaP1dmJpgJ0_NldqAUXCXMlirTwHjNG/exec";

        Office.onReady(() => {
            setInterval(updateStatus, 3000);
        });

        function updateStatus() {
            Office.context.mailbox.item.start.getAsync(s => {
                Office.context.mailbox.item.end.getAsync(e => {
                    const url = `${GAS_URL}?action=check&start=${s.value.toISOString()}&end=${e.value.toISOString()}`;
                    fetch(url).then(r => r.json()).then(rooms => {
                        const html = rooms.map(r => `
                            <div class="room ${r.is_busy ? 'busy' : 'free'}" onclick="${r.is_busy ? '' : `book('${r.name}')`}">
                                ${r.name} - ${r.is_busy ? '使用中' : '可預約 (點擊預訂)'}
                            </div>
                        `).join('');
                        document.getElementById('list').innerHTML = html;
                    });
                });
            });
        }

        function book(roomName) {
            Office.context.mailbox.item.start.getAsync(s => {
                Office.context.mailbox.item.end.getAsync(e => {
                    const data = {
                        room: roomName,
                        start: s.value.toISOString(),
                        end: e.value.toISOString(),
                        user: Office.context.mailbox.userProfile.emailAddress
                    };
                    fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) }).then(() => {
                        alert("預約成功！");
                        Office.context.mailbox.item.location.setAsync(roomName);
                    });
                });
            });
        }
    </script>
</body>
</html>
